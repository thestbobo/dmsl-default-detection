# Project configuration — the single source of truth for tunable knobs.
#
# src/config.py loads this file once at import and exposes the values as the
# same module-level names other code already imports (config.SEED, config.NUMERIC,
# config.N_SPLITS, ...). 
#
# To change the deployed model after experiments, edit 'chosen:' below (NOT main.py
# and NOT src/models.py). Tuning still runs in experiments.

# Reproducibility ------------------------------------------------------------
seed: 8888 # single global seed; injected into every estimator and set_seed().

# Cross-validation -----------------------------------------------------------
cv:
  n_splits: 5
  # Fold seeds for paired repeated-CV robustness checks.
  validation_seeds: [42, 1, 7, 2024, 99]

# Deployed objective ---------------------------------------------------------
# We submit behind a macro-F1 threshold tuner, so configs are scored at the best
# threshold over this grid on OOF probabilities (np.linspace(start, stop, num)).
threshold_grid:
  start: 0.05
  stop: 0.95
  num: 181

# Column groups (dataset schema) ---------------------------------------------
columns:
  # Nominal -> one-hot encoded (after folding undocumented codes).
  categorical: [SEX, EDUCATION, MARRIAGE]
  # Repayment status, most-recent (PAY_0 = Sept) to oldest (PAY_6 = April).
  pay: [PAY_0, PAY_2, PAY_3, PAY_4, PAY_5, PAY_6]
  # Bill statement amounts, Sep..Apr (BILL_AMT1 = most recent).
  bill: [BILL_AMT1, BILL_AMT2, BILL_AMT3, BILL_AMT4, BILL_AMT5, BILL_AMT6]
  # Previous payment amounts, Sep..Apr (PAY_AMT1 = most recent).
  pay_amt: [PAY_AMT1, PAY_AMT2, PAY_AMT3, PAY_AMT4, PAY_AMT5, PAY_AMT6]
  # Remaining numeric columns. NUMERIC = base_numeric + pay + bill + pay_amt.
  base_numeric: [LIMIT_BAL, AGE]

# Chosen production config (what main.py trains) -----------------------------
# Deployed model: class-balanced random forest on the engineered feature set, with
# macro-F1 threshold tuning. The chosen feature groups and encoding land here.
chosen:
  feature_groups: [paysem, stress, payratio]
  encoding: {pay_remap: false, pay_flags: false, scale: false, log1p: false, bill_neg: keep}
  hgb_params: {}        # ignored on the random-forest deploy path
  ensemble: [rf_balanced]


# Experiment registry --------------------------------------------------------
# Named feature-group configs swept by experiments/feature_experiments.py.
# Each value is a list of engineered-feature group names (see src/preprocessing.py
# ENGINEERED_COLUMNS). Combos are appended here as experiments progress.
experiments:
  feature_configs:
    baseline: []
    pay: [pay]
    util: [util]
    payratio: [payratio]
    bill: [bill]
    # Combinations of the mildly-positive families + interactions.
    util_payratio: [util, payratio]
    pay_util_payratio: [pay, util, payratio]
    all: [pay, util, payratio, bill]
    # PAY-semantic family + recent coverage/trend, alone and stacked on payratio.
    # Feature engineering on the random forest is the main lever that moves the LB.
    paysem: [paysem]
    coverx: [coverx]
    paysem_payratio: [paysem, payratio]
    coverx_payratio: [coverx, payratio]
    paysem_coverx_payratio: [paysem, coverx, payratio]
    paysem_util_payratio: [paysem, util, payratio]
    # Variations around the paysem + util + payratio triplet.
    paysem_util: [paysem, util]
    paysem_util_coverx_payratio: [paysem, util, coverx, payratio]
    paysem_util_payratio_bill: [paysem, util, payratio, bill]
    paysem_coverx: [paysem, coverx]
    all_new: [paysem, coverx, util, payratio]
    # Granular per-month ratios + stress interactions swapped into the triplet.
    paysem_utilmonths_payratio: [paysem, utilmonths, payratio]
    paysem_util_payamtratio: [paysem, util, payamtratio]
    paysem_stress_payratio: [paysem, stress, payratio]
    paysem_util_payratio_stress: [paysem, util, payratio, stress]
    # Richer PAY dynamics (recovery/escalation/recent-vs-old) augmenting paysem.
    paysem2_util_payratio: [paysem2, util, payratio]
    paysem_paysem2_payratio: [paysem, paysem2, payratio]
    paysem2_stress_payratio: [paysem2, stress, payratio]
    paysem_paysem2_util_payratio: [paysem, paysem2, util, payratio]

  # Named ENCODING variants swept by experiments/encoding_experiments.py.
  # Each value is an encoding spec (toggles); partial specs are merged onto
  # ENCODING_DEFAULTS in src/config.py. Every variant changes ONE thing vs `baseline`
  # (except the deliberate `clean_linear` combo), so its effect is isolated. Screened on
  # both hgb and logreg, a monotone rescaling is a no-op for the tree but matters for
  # the linear model.
  encoding_configs:
    baseline:        {}                                                      # baseline encoding (scale on, raw cols)
    pay_remap:       {pay_remap: true}                                       # clean monotone PAY_* ordinal
    pay_remap_flags: {pay_remap: true, pay_flags: true}                      # + per-month delinquency flags
    noscale:         {scale: false}                                          # drop StandardScaler (no-op for trees)
    log1p:           {log1p: true}                                           # signed log1p on monetary cols
    bill_clip:       {bill_neg: clip}                                        # clip overpayments at 0
    bill_flag:       {bill_neg: flag}                                        # keep, add overpayment flags
    # Linear-oriented combo: clean ordinal + compressed tails + scaling (for LogReg).
    clean_linear:    {pay_remap: true, log1p: true, scale: true, bill_neg: clip}

  # Named MODEL configs swept by experiments/model_experiments.py.
  # Each entry: 'kind' (estimator family, resolved to a class by the script),
  # optional 'params' (estimator kwargs; random_state is injected), and an 'encoding'
  # variant NAME from encoding_configs above, each model gets the encoding that suits
  # it (trees: a monotone rescaling is a no-op, so 'noscale'; LogReg: the 'clean_linear'
  # combo). The sweep scores each on the deployed objective, measures prediction
  # diversity vs the HGB anchor, and previews equal-weight soft-vote ensembles. hgb is
  # the anchor every challenger is compared against.
  model_configs:
    hgb:          {kind: hgb,    encoding: noscale}                                                   # baseline anchor
    logreg_clean: {kind: logreg, encoding: clean_linear, params: {class_weight: balanced, max_iter: 1000}}  # the diverse linear baseline
    rf:           {kind: rf,     encoding: noscale, params: {n_estimators: 300, min_samples_leaf: 20, n_jobs: -1}}
    rf_balanced:  {kind: rf,     encoding: noscale, params: {n_estimators: 300, min_samples_leaf: 20, class_weight: balanced, n_jobs: -1}}
    et:           {kind: et,     encoding: noscale, params: {n_estimators: 300, min_samples_leaf: 20}}
    # ExtraTrees + balanced weights: more decorrelated than RF, a candidate ensemble
    # member. Mirrors rf_balanced's knobs.
    et_balanced:  {kind: et,     encoding: noscale, params: {n_estimators: 300, min_samples_leaf: 20, class_weight: balanced, n_jobs: -1}}
    gb:           {kind: gb,     encoding: baseline}                                                  # plain GradientBoosting (slow, no histogram)

  # Named ENSEMBLE previews validated by experiments/model_experiments.py.
  # Each value is a list of model_configs names whose OOF probabilities are averaged
  # (equal-weight soft-vote) at a shared CV split, then threshold-tuned on the deployed
  # objective. Soft-voting on OOF arrays is honest because all models share the same
  # folds at a given seed.
  ensemble_configs:
    hgb_logreg:        [hgb, logreg_clean]
    hgb_rf:            [hgb, rf]
    hgb_et:            [hgb, et]
    hgb_logreg_et:     [hgb, logreg_clean, et]
    hgb_logreg_rf:     [hgb, logreg_clean, rf]
    all:               [hgb, logreg_clean, rf, et, gb]
    # Soft-vote around the rf_balanced champion + the most-decorrelated members.
    rfbal_logreg_et:   [rf_balanced, logreg_clean, et]

  # Imbalance handling. Threshold tuning already handles the final decision cut; these
  # candidates ask whether changing the fitted loss via class_weight changes the
  # probability ranking enough to help macro-F1. Swept by imbalance_experiments.py.
  imbalance_configs:
    hgb_balanced: {base_model: hgb, params: {class_weight: balanced}}
    hgb_w15:      {base_model: hgb, params: {class_weight: {0: 1.0, 1: 1.5}}}
    hgb_w20:      {base_model: hgb, params: {class_weight: {0: 1.0, 1: 2.0}}}
    hgb_w30:      {base_model: hgb, params: {class_weight: {0: 1.0, 1: 3.0}}}
    rf_balanced:  {base_model: rf,  params: {class_weight: balanced, n_jobs: -1}}
    rf_balanced_leaf10: {base_model: rf, params: {min_samples_leaf: 10, class_weight: balanced, n_jobs: -1}}
    rf_balanced_leaf30: {base_model: rf, params: {min_samples_leaf: 30, class_weight: balanced, n_jobs: -1}}
    rf_balanced_leaf50: {base_model: rf, params: {min_samples_leaf: 50, class_weight: balanced, n_jobs: -1}}
    rf_balanced_subsample: {base_model: rf, params: {class_weight: balanced_subsample, n_jobs: -1}}
    rf_balanced_mf05: {base_model: rf, params: {max_features: 0.5, class_weight: balanced, n_jobs: -1}}

  # Stronger boosting library (LightGBM). Optional dependency (lightgbm + an OpenMP
  # runtime), swept by experiments/boosting_experiments.py with the same deployed
  # objective + paired repeated CV. 'kind: lgbm' resolves to the lazy LGBMClassifier
  # factory in src/models.py; encoding 'noscale' (trees ignore monotone rescaling).
  # 'class_weight: balanced' mirrors the class-weight lever; regularised variants guard
  # against overfitting the 24k training rows.
  boosting_configs:
    lgbm_default:       {kind: lgbm, encoding: noscale}
    lgbm_balanced:      {kind: lgbm, encoding: noscale, params: {class_weight: balanced}}
    lgbm_reg:           {kind: lgbm, encoding: noscale, params: {n_estimators: 400, learning_rate: 0.03, num_leaves: 31, min_child_samples: 50, subsample: 0.8, subsample_freq: 1, colsample_bytree: 0.8, reg_lambda: 1.0}}
    lgbm_reg_balanced:  {kind: lgbm, encoding: noscale, params: {n_estimators: 400, learning_rate: 0.03, num_leaves: 31, min_child_samples: 50, subsample: 0.8, subsample_freq: 1, colsample_bytree: 0.8, reg_lambda: 1.0, class_weight: balanced}}
    lgbm_deep_balanced: {kind: lgbm, encoding: noscale, params: {n_estimators: 600, learning_rate: 0.02, num_leaves: 63, min_child_samples: 80, subsample: 0.8, subsample_freq: 1, colsample_bytree: 0.7, reg_lambda: 2.0, class_weight: balanced}}

  # Resampling (optional dependency: imbalanced-learn). Rather than class weighting,
  # this rebalances the training folds. The sampler runs INSIDE an imblearn Pipeline so
  # it only fires on the training folds during fit (never the held-out fold),
  # leakage-safe. Because resampling does the rebalancing, the base estimator is the
  # plain rf (no class_weight) to avoid double-correcting. Swept by
  # experiments/resampling_experiments.py vs the deployed rf_balanced champion.
  resampling_configs:
    smote:        {base_model: rf, sampler: smote}
    smotetomek:   {base_model: rf, sampler: smotetomek}      # SMOTE + Tomek links (hybrid)
    smoteenn:     {base_model: rf, sampler: smoteenn}        # SMOTE + edited NN (hybrid)
    borderline:   {base_model: rf, sampler: borderline}      # BorderlineSMOTE
    undersample:  {base_model: rf, sampler: undersample}     # RandomUnderSampler
    smote_hgb:    {base_model: hgb, sampler: smote}           # SMOTE on the boosting path
    smotetomek_hgb: {base_model: hgb, sampler: smotetomek}
